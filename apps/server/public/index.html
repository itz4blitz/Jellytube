<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jellytube</title>
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero card">
        <div class="hero-main">
          <h1 id="appName">Jellytube</h1>
          <div id="heroStats" class="hero-stats"></div>
        </div>
        <button id="logoutButton" class="ghost" hidden>Log out</button>
      </section>

      <section id="statusCard" class="card muted-card" hidden>
        <p id="statusMessage">Loading...</p>
      </section>

      <section id="loginCard" class="card split-card" hidden>
        <form id="loginForm" class="stack">
          <h2>Sign in</h2>
          <label>
            <span>Username</span>
            <input id="username" name="username" autocomplete="username" required>
          </label>
          <label>
            <span>Password</span>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">Sign in</button>
        </form>
      </section>

      <section id="dashboard" class="dashboard" hidden>
        <div class="left-stack">
          <section id="requestCard" class="card request-composer" hidden>
            <div class="section-header compact-header">
              <h2>Add Request</h2>
              <p id="welcomeLine" class="subtle" hidden></p>
            </div>
            <div class="composer-grid">
              <form id="requestForm" class="stack">
                <label>
                  <span>URL</span>
                  <input id="requestUrl" name="url" type="url" placeholder="https://www.youtube.com/watch?v=..." required>
                </label>
                <label>
                  <span>Title</span>
                  <input id="titleHint" name="titleHint" placeholder="Optional title">
                </label>
                <label>
                  <span>Note</span>
                  <textarea id="requestNote" name="note" rows="3" placeholder="Optional note"></textarea>
                </label>
                <button type="submit">Submit</button>
              </form>

              <aside class="preview-panel stack">
                <h3 id="requestPreviewTitle">Paste a link.</h3>
                <p id="requestPreviewSummary" class="subtle" hidden></p>
                <div id="requestPreviewBadges" class="pill-row"></div>
                <p id="requestPreviewNote" class="subtle" hidden></p>
              </aside>
            </div>
          </section>

          <section id="accountCard" class="card compact-card" hidden>
            <div class="account-inline">
              <strong id="accountUsername">-</strong>
              <span id="accountRole" class="badge">-</span>
            </div>
            <code id="accountUserId">-</code>
            <div id="myStatsLine" class="pill-row account-pills"></div>
          </section>
        </div>

        <div class="right-stack">
          <section id="adminCard" class="card list-card" hidden>
            <div class="section-header compact-header">
              <h2>Admin Queue</h2>
              <div id="statsLine" class="pill-row"></div>
            </div>
            <div id="pendingRequests" class="stack list"></div>
          </section>

          <section id="requestsCard" class="card list-card" hidden>
            <div class="section-header compact-header">
              <h2>Your Requests</h2>
            </div>
            <div id="myRequests" class="stack list"></div>
          </section>
        </div>
      </section>
    </main>

    <template id="requestTemplate">
      <article class="request-item">
        <div class="request-head">
          <div class="request-meta">
            <span class="badge badge-source"></span>
            <span class="badge badge-kind"></span>
            <span class="badge badge-status"></span>
          </div>
          <p class="request-created"></p>
        </div>
        <h3 class="request-title"></h3>
        <p class="request-url"></p>
        <p class="request-note"></p>
        <div class="request-extra"></div>
        <div class="actions"></div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
